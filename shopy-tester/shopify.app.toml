# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "885e7354be14689526ddec777778863f"
application_url = "https://frontend-production-4188.up.railway.app"
embedded = true
name = "ShopyTester"

[access_scopes]
# Read-only: the app only scans the shop and gives feedback; it never writes.
scopes = "read_products,read_content,read_themes,read_online_store_pages,read_online_store_navigation"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [
  "https://frontend-production-4188.up.railway.app/auth/callback",
  "https://frontend-production-4188.up.railway.app/auth/shopify/callback",
  "https://frontend-production-4188.up.railway.app/api/auth/callback"
]

[build]
# Keep `shopify app dev` from overwriting the production (Railway) App URL with a
# temporary Cloudflare tunnel. Re-enable only if you want dev to manage URLs.
automatically_update_urls_on_dev = false
